<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>歌词格式化工具</title>
  <style>
    :root {
      --bg: #f7f2e8;
      --card: rgba(255, 251, 244, 0.9);
      --text: #2f2320;
      --muted: #7a6761;
      --line: rgba(96, 56, 33, 0.12);
      --accent: #b02024;
      --accent-dark: #8e181c;
      --shadow: 0 20px 50px rgba(100, 54, 26, 0.12);
      --radius: 22px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Serif SC", "Songti SC", serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(217, 134, 59, 0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(176, 32, 36, 0.14), transparent 22%),
        linear-gradient(135deg, #efe6d7 0%, #f9f5ee 50%, #f3eadf 100%);
      padding: 28px 18px 40px;
    }

    .wrap {
      max-width: 1160px;
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 22px;
    }

    .tag {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(176, 32, 36, 0.18);
      color: var(--accent);
      background: rgba(255, 255, 255, 0.42);
      font-size: 13px;
      letter-spacing: .08em;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(32px, 5vw, 58px);
      line-height: 1.05;
    }

    .desc {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      line-height: 1.9;
      font-size: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .tip {
      margin: 0 0 14px;
      font-size: 13px;
      color: var(--muted);
    }

    textarea {
      width: 100%;
      min-height: 430px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.74);
      color: var(--text);
      font: 500 15px/1.9 "Noto Serif SC", "Songti SC", serif;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(176, 32, 36, 0.4);
      box-shadow: 0 0 0 4px rgba(176, 32, 36, 0.08);
    }

    .bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      cursor: pointer;
      font: 600 14px/1 "Noto Serif SC", "Songti SC", serif;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), #cb3d40);
      color: #fffaf3;
      box-shadow: 0 12px 26px rgba(176, 32, 36, 0.22);
    }

    .secondary {
      background: rgba(138, 92, 60, 0.09);
      color: var(--text);
      border: 1px solid rgba(110, 69, 36, 0.12);
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
    }

    .foot {
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.8;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      textarea { min-height: 300px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <span class="tag">歌词格式化页面</span>
      <h1>把普通歌词一键整理成统一时间标签格式</h1>
      <p class="desc">粘贴普通歌词后，页面会自动将每一行转换成 <code>[00:00.00] 歌词内容</code>。默认已经预填示例歌词，打开就能直接试。</p>
    </section>

    <section class="grid">
      <article class="panel">
        <h2>原始歌词</h2>
        <p class="tip">支持多行粘贴，自动忽略空行和首尾空格。</p>
        <textarea id="input" placeholder="把普通歌词粘贴到这里"></textarea>
        <div class="bar">
          <div class="actions">
            <button class="primary" id="formatBtn">立即格式化</button>
            <button class="secondary" id="clearBtn">清空</button>
          </div>
          <div class="meta" id="lineCount">共 0 行</div>
        </div>
      </article>

      <article class="panel">
        <h2>格式化结果</h2>
        <p class="tip">生成后可以直接复制到歌词文件或播放器。</p>
        <textarea id="output" readonly placeholder="格式化结果会显示在这里"></textarea>
        <div class="bar">
          <div class="actions">
            <button class="primary" id="copyBtn">复制结果</button>
          </div>
          <div class="meta" id="copyStatus">等待复制</div>
        </div>
      </article>
    </section>

    <p class="foot">当前规则：移除空行，保留原有标点，并为每一行统一加上固定时间标签 <code>[00:00.00]</code>。</p>
  </main>

  <script>
    const input = document.getElementById("input");
    const output = document.getElementById("output");
    const lineCount = document.getElementById("lineCount");
    const copyStatus = document.getElementById("copyStatus");
    const preset = `我们是共产主义接班人，
继承革命先辈的光荣传统，
爱祖国，爱人民，
鲜艳的红领巾飘扬在前胸。
不怕困难，不怕敌人，
顽强学习，坚决斗争，
向着胜利勇敢前进，
向着胜利勇敢前进，前进！
向着胜利勇敢前进，
我们是共产主义接班人。`;

    function formatLyrics(text) {
      return text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => `[00:00.00] ${line}`)
        .join("\n");
    }

    function refresh() {
      const lines = input.value
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(Boolean);
      output.value = formatLyrics(input.value);
      lineCount.textContent = `共 ${lines.length} 行`;
    }

    document.getElementById("formatBtn").addEventListener("click", refresh);
    input.addEventListener("input", refresh);

    document.getElementById("clearBtn").addEventListener("click", () => {
      input.value = "";
      output.value = "";
      lineCount.textContent = "共 0 行";
      copyStatus.textContent = "已清空";
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      if (!output.value.trim()) {
        copyStatus.textContent = "没有可复制的内容";
        return;
      }
      try {
        await navigator.clipboard.writeText(output.value);
        copyStatus.textContent = "复制成功";
      } catch (err) {
        output.select();
        document.execCommand("copy");
        copyStatus.textContent = "复制成功";
      }
    });

    input.value = preset;
    refresh();
  </script>
</body>
</html>
